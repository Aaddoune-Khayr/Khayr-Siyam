name: khayr_siyam
description: Application de jeûne islamique avec calendrier et hadiths
publish_to: 'none'
version: 1.2.2+7

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.2
  shared_preferences: ^2.2.2
  hijri: ^3.0.0
  flutter_staggered_animations: ^1.1.1
  table_calendar: ^3.0.9
  intl: ^0.20.2
  flutter_local_notifications: ^19.3.0
  timezone: ^0.10.0
  provider: ^6.0.5
  permission_handler: ^11.3.0
  flutter_timezone: ^4.1.1
  android_intent_plus: ^5.3.0
  google_fonts: ^6.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.13.1
  flutter_native_splash: ^2.4.4

flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/fonts/
    - assets/logo_app.png
    - assets/logo_splash.png

  fonts:
    - family: Amiri
      fonts:
        - asset: assets/fonts/Amiri-Regular.ttf
        - asset: assets/fonts/Amiri-Bold.ttf
          weight: 700

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/logo_app.png"
  adaptive_icon_background: "#121212"
  adaptive_icon_foreground: "assets/logo_app.png"

flutter_native_splash:
  color: "#121212"
  image: assets/logo_splash.png
  android_12:
    color: "#121212"
    image: assets/logo_splash.png
